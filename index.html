<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Audiobooks</title>

<link rel="manifest" href="manifest.json">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #1b2f23 0%, #0f1f17 100%);
  color: #e5e7eb;
}

header {
  padding: 15px;
  text-align: center;
  font-size: 22px;
  background: #102a1c;
  border-bottom: 1px solid #1f3d2a;
}

#search {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #163524;
  color: white;
  outline: none;
}

#search::placeholder {
  color: #9ca3af;
}

.section {
  padding: 10px;
}

.section h2 {
  margin: 5px 10px;
  font-size: 18px;
  color: #a7f3d0;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 10px;
}

.card {
  background: #102a1c;
  border: 1px solid #1f3d2a;
  border-radius: 12px;
  padding: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.card:hover {
  transform: scale(1.03);
  border-color: #34d399;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.player {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: #0f2218;
  border-top: 1px solid #1f3d2a;
  padding: 10px;
}

.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

button {
  padding: 8px;
  border: none;
  border-radius: 8px;
  background: #14532d;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #166534;
}
</style>
</head>

<body>

<header>🎧 My Audiobooks</header>

<input id="search" placeholder="Search books...">

<div class="section">
  <h2>Continue Listening</h2>
  <div class="container" id="continue"></div>
</div>

<div class="section">
  <h2>Library</h2>
  <div class="container" id="library"></div>
</div>

<div class="player">
  <div id="nowPlaying">Nothing playing</div>
  <div id="chapterInfo"></div>

  <audio id="audio" controls></audio>

  <div class="controls">
    <div>
      <button onclick="skip(-30)">⏪ 30s</button>
      <button onclick="skip(30)">30s ⏩</button>
    </div>

    <div>
      <button onclick="setSpeed(1)">1x</button>
      <button onclick="setSpeed(1.25)">1.25x</button>
      <button onclick="setSpeed(1.5)">1.5x</button>
    </div>
  </div>
</div>

<script>
const books = [
  {
    title: "Book 1",
    cover: "covers/book1.jpg",
    chapters: [
      "books/book1/ch1.mp3",
      "books/book1/ch2.mp3"
    ]
  },
  {
    title: "Book 2",
    cover: "covers/book2.jpg",
    chapters: [
      "books/book2/ch1.mp3",
      "books/book2/ch2.mp3"
    ]
  }
];

let currentBook = null;
let currentChapter = 0;

const library = document.getElementById("library");
const continueDiv = document.getElementById("continue");
const audio = document.getElementById("audio");
const nowPlaying = document.getElementById("nowPlaying");
const chapterInfo = document.getElementById("chapterInfo");

function createCard(book) {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${book.cover}">
    <div>${book.title}</div>
  `;
  div.onclick = () => startBook(book);
  return div;
}

function loadBooks(filter = "") {
  library.innerHTML = "";
  books
    .filter(b => b.title.toLowerCase().includes(filter.toLowerCase()))
    .forEach(book => {
      library.appendChild(createCard(book));
    });
}

function loadContinue() {
  continueDiv.innerHTML = "";

  books.forEach(book => {
    const progress = localStorage.getItem(book.title);
    if (progress) {
      continueDiv.appendChild(createCard(book));
    }
  });
}

function startBook(book) {
  currentBook = book;

  const saved = JSON.parse(localStorage.getItem(book.title));
  currentChapter = saved ? saved.chapter : 0;

  playChapter();
}

function playChapter() {
  const file = currentBook.chapters[currentChapter];
  audio.src = file;

  nowPlaying.innerText = "Playing: " + currentBook.title;
  chapterInfo.innerText = "Chapter " + (currentChapter + 1);

  const saved = JSON.parse(localStorage.getItem(currentBook.title));
  if (saved && saved.chapter === currentChapter) {
    audio.currentTime = saved.time;
  }

  audio.play().catch(() => {});
}

audio.ontimeupdate = () => {
  if (!currentBook) return;

  localStorage.setItem(currentBook.title, JSON.stringify({
    chapter: currentChapter,
    time: audio.currentTime
  }));
};

audio.onended = () => {
  if (!currentBook) return;

  currentChapter++;
  if (currentChapter < currentBook.chapters.length) {
    playChapter();
  }
};

function skip(seconds) {
  audio.currentTime += seconds;
}

function setSpeed(rate) {
  audio.playbackRate = rate;
}

document.getElementById("search").oninput = (e) => {
  loadBooks(e.target.value);
};

loadBooks();
loadContinue();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
